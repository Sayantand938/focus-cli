# Focus CLI - A simple time-tracking CLI app

[project]
name = "focus-cli"
description = "A command-line tool for tracking focused work sessions."
version = "1.0.0"
author = "Your Name"
license = "MIT"

[dependencies]
oclif = true
better-sqlite3 = true
date-fns = true
uuid = true
cli-table3 = true
env-paths = true
cosmiconfig = true
debug = true
humanize-duration = true
fs-extra = true
zod = true
inquirer = true
json2csv = false

[commands]
start = "Starts a session, logs start time"
stop = "Stops the session, records stop time, calculates duration"
list = "Shows all sessions in a table (formatted times, shortened UUIDs)"
summary = "Shows total & average focus time per day with ✅ or ❌"
delete = "Deletes a session using first 8 characters of its ID"
config = "Modify user preferences (storage location, format)"
export = "Export session data as JSON or CSV (optional)"

[storage]
type = "better-sqlite3"
location = "Stored in env-paths"
filename = "focus-cli.db"

[database.sessions]
columns = [
  { name = "id", type = "TEXT", constraints = "PRIMARY KEY (UUID)" },
  { name = "start_time", type = "TEXT", constraints = "NOT NULL (ISO 8601)" },
  { name = "stop_time", type = "TEXT", constraints = "NULL (set when session stops)" },
  { name = "duration", type = "INTEGER", constraints = "NULL (stored in seconds)" }
]

[features]
sqlite_storage = true
config_file_support = true
debugging = true
cli_table_output = true
prevent_duplicate_sessions = true
formatted_durations = true
interactive_prompts = false
centralized_error_handling = true
user_friendly_errors = true

[summary.table]
columns = [
  { name = "SL", description = "Serial number (auto-incremented)" },
  { name = "Date", description = "Group sessions by date (YYYY-MM-DD)" },
  { name = "Average", description = "Average session duration per day (hh:mm)" },
  { name = "Total", description = "Total focus time per day (hh:mm)" },
  { name = "Status", description = "✅ if total >= 8h, else ❌" }
]
status_condition = "✅ if total >= 8 hours, otherwise ❌"
grouping = "Sessions are grouped by DATE(start_time)"
average_formula = "SUM(duration) / COUNT(id)"
total_formula = "SUM(duration)"

[summary.sql]
query = """
  SELECT 
    ROW_NUMBER() OVER () AS SL,
    DATE(start_time) AS Date,
    strftime('%H:%M', AVG(duration), 'unixepoch') AS Average,
    strftime('%H:%M', SUM(duration), 'unixepoch') AS Total,
    CASE 
      WHEN SUM(duration) >= 28800 THEN '✅'
      ELSE '❌'
    END AS Status
  FROM sessions
  WHERE stop_time IS NOT NULL
  GROUP BY DATE(start_time)
  ORDER BY Date DESC;
"""

[delete.command]
description = "Deletes a session using first 8 characters of its ID."
confirmation_required = true
error_if_not_found = true
user_friendly_message = "Session successfully deleted."

[delete.sql]
query = """
  DELETE FROM sessions
  WHERE id LIKE ? || '%'
  RETURNING id;
"""
parameter = "First 8 characters of UUID"

[delete.example]
input = "focus delete a1b2c3d4"
output = "✔ Session a1b2c3d4... deleted successfully."
error_if_not_found = "❌ Error: No session found with that ID."

[list.table]
columns = [
  { name = "ID", description = "First 8 characters of UUID" },
  { name = "Date", description = "Session date (YYYY-MM-DD)" },
  { name = "Start Time", description = "HH:MM AM/PM format" },
  { name = "Stop Time", description = "HH:MM AM/PM format" },
  { name = "Duration", description = "hh:mm format" }
]
uuid_format = "First 8 characters only"
time_format = "HH:MM AM/PM for start/stop, hh:mm for duration"

[list.sql]
query = """
  SELECT 
    SUBSTR(id, 1, 8) AS ID,
    DATE(start_time) AS Date,
    strftime('%I:%M %p', start_time) AS "Start Time",
    strftime('%I:%M %p', stop_time) AS "Stop Time",
    strftime('%H:%M', duration, 'unixepoch') AS Duration
  FROM sessions
  WHERE stop_time IS NOT NULL
  ORDER BY start_time DESC;
"""

[centralized_error_handling]
enabled = true
log_errors = false
display_stack_trace = false
custom_messages = [
  { error = "DatabaseError", message = "❌ Database issue, please try again later." },
  { error = "NotFoundError", message = "❌ Error: No session found with that ID." },
  { error = "ValidationError", message = "❌ Invalid input. Please check and try again." },
  { error = "UnknownError", message = "❌ Something went wrong. Please try again later." }
]
